<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMS Middleware — Inventory Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cyan:var(--blue);--cyan2:var(--blue-hover);--cyan3:var(--blue);--cyandim:var(--blue-bg);--cyanglow:var(--blue-bg);
  --bg:#FFFFFF;
  --bg2:#F8F9FB;
  --bg3:#F1F3F7;
  --bg4:#E8ECF2;
  --border:#E2E6EE;
  --border2:#D0D6E2;
  --text:#111827;
  --text2:#374151;
  --text3:#6B7280;
  --text4:#9CA3AF;

  --blue:#2563EB;
  --blue-bg:rgba(37,99,235,.08);
  --blue-border:rgba(37,99,235,.2);
  --blue-hover:#1D4ED8;

  --ok:#16A34A;
  --ok-bg:rgba(22,163,74,.08);
  --ok-border:rgba(22,163,74,.2);
  --warn:#D97706;
  --warn-bg:rgba(217,119,6,.08);
  --warn-border:rgba(217,119,6,.2);
  --err:#DC2626;
  --err-bg:rgba(220,38,38,.08);
  --err-border:rgba(220,38,38,.2);
  --info:#0891B2;
  --info-bg:rgba(8,145,178,.08);
  --info-border:rgba(8,145,178,.2);

  --sidebar-w:220px;
  --topbar-h:56px;
  --sysbar-h:32px;

  --mono:'JetBrains Mono',monospace;
  --sans:'Plus Jakarta Sans',sans-serif;
  --r:6px;--rmd:8px;--rlg:10px;--rxl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;display:flex}
#root{flex:1;min-width:0;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
button{cursor:pointer;font-family:var(--sans)}
input,select,textarea{font-family:var(--sans)}

/* ─── SIDEBAR ─────────────────────────────────────────────────────────────── */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sb-logo{padding:16px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-mark svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2}
.sb-logo-text{font-size:14px;font-weight:800;color:var(--text);line-height:1.2;letter-spacing:-.3px}
.sb-logo-sub{font-size:10px;color:var(--text4);margin-top:1px;font-family:var(--mono)}
.sb-nav{padding:8px 10px;flex:1;overflow-y:auto}
.sb-section{font-size:10px;color:var(--text4);letter-spacing:.6px;text-transform:uppercase;padding:10px 6px 4px;font-weight:700}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:var(--rmd);cursor:pointer;color:var(--text4);transition:all .1s;position:relative;margin-bottom:1px}
.sb-item:hover{background:var(--bg3);color:var(--text4)}
.sb-item.active{background:var(--blue-bg);color:var(--blue)}
.sb-item svg{width:15px;height:15px;flex-shrink:0}
.sb-item span{font-size:13px;font-weight:500}
.sb-badge{margin-left:auto;background:var(--err);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:10px;min-width:16px;text-align:center;font-family:var(--mono)}
.sb-badge.warn{background:var(--warn)}
.sb-badge.ok{background:var(--ok)}
.sb-footer{padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.sb-user-role{font-size:10px;color:var(--text4)}
.sb-conn-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);margin-left:auto;flex-shrink:0}

/* ─── MAIN SHELL ──────────────────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#topbar{height:var(--topbar-h);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.tb-crumb{font-size:11px;color:var(--text4);display:flex;align-items:center;gap:4px}
.tb-crumb svg{width:12px;height:12px;opacity:.4}
.tb-spacer{flex:1}
.tb-btn{background:var(--blue);border:none;border-radius:var(--rmd);color:#fff;padding:6px 14px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:5px;transition:background .1s}
.tb-btn:hover{background:var(--blue-hover)}
.tb-btn svg{width:13px;height:13px}
.tb-btn-ghost{background:transparent;border:1px solid var(--border);border-radius:var(--rmd);color:var(--text4);padding:5px 11px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;transition:all .1s}
.tb-btn-ghost:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.tb-btn-ghost svg{width:13px;height:13px}
.tb-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ok)}
.tb-pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.tb-clock{font-family:var(--mono);font-size:11px;color:var(--text4);min-width:48px;text-align:right}
#content{flex:1;overflow-y:auto;padding:20px 22px}

/* ─── SYS BAR ─────────────────────────────────────────────────────────────── */
.sys-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:var(--sysbar-h);display:flex;align-items:center;gap:16px;flex-shrink:0}
.sys-metric{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text4);font-family:var(--mono)}
.sys-metric-val{color:var(--text4);font-weight:500}
.sys-divider{width:1px;height:14px;background:var(--border)}
.filter-spacer{flex:1}

/* ─── KPI CARDS ───────────────────────────────────────────────────────────── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.kpi{background:var(--bg);border:1px solid var(--border);border-radius:var(--rxl);padding:16px;transition:border-color .1s,box-shadow .1s}
.kpi:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-accent{border-color:var(--blue-border);background:var(--blue-bg)}
.kpi-label{font-size:11px;color:var(--text4);margin-bottom:10px;font-weight:600;display:flex;align-items:center;gap:5px}
.kpi-label-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.kpi-val{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--text);line-height:1;margin-bottom:6px}
.kpi-accent .kpi-val{color:var(--blue)}
.kpi-footer{display:flex;align-items:center;justify-content:space-between}
.kpi-sub{font-size:11px;color:var(--text4)}
.kpi-trend{font-size:11px;font-family:var(--mono);display:flex;align-items:center;gap:3px}
.kpi-up{color:var(--ok)}
.kpi-down{color:var(--err)}

/* ─── CARDS ───────────────────────────────────────────────────────────────── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rxl);margin-bottom:12px;overflow:hidden}
.card-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.card-sub{font-size:11px;color:var(--text4);margin-top:1px}
.card-spacer{flex:1}
.card-body{padding:14px 16px}
.card-icon{width:30px;height:30px;border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ─── TABLE ───────────────────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{text-align:left;font-size:11px;color:var(--text4);letter-spacing:.4px;text-transform:uppercase;padding:9px 12px;font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--bg3);font-size:12.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .06s}
tbody tr:hover{background:var(--bg)}
.mono{font-family:var(--mono);font-size:11px}

/* ─── BADGES ──────────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border)}
.badge-err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-border)}
.badge-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.badge-info{background:var(--info-bg);color:var(--info);border:1px solid var(--info-border)}
.badge-dim{background:var(--bg3);color:var(--text4);border:1px solid var(--border)}
.badge-cyan{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-ok{background:var(--ok)}
.dot-err{background:var(--err)}
.dot-warn{background:var(--warn)}
.dot-info{background:var(--info)}
.dot-cyan{background:var(--blue)}

/* ─── CHANNEL PILLS ───────────────────────────────────────────────────────── */
.ch-shopee{background:#FFF1EE;color:#C1370D;border:1px solid #FDBCAD}
.ch-lazada{background:#F0EEFF;color:#4F35D1;border:1px solid #C4B8F5}
.ch-zalora{background:#EFF6FF;color:#1D5FAD;border:1px solid #BFDBFE}
.ch-shopify{background:#F0FFF4;color:#1A6638;border:1px solid #A7F3D0}
.ch-magento{background:#FFF7ED;color:#B45309;border:1px solid #FDE68A}
.ch-sap{background:#EFF6FF;color:#0369A1;border:1px solid #BAE6FD}
.ch-custom{background:#FAF5FF;color:#7C3AED;border:1px solid #DDD6FE}

/* ─── FILTER BAR ──────────────────────────────────────────────────────────── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--rmd);padding:6px 10px;color:var(--text);font-size:12px;cursor:pointer;transition:border-color .1s}
.filter-select:focus{outline:none;border-color:var(--blue)}
.filter-input{background:var(--bg);border:1px solid var(--border);border-radius:var(--rmd);padding:6px 10px;color:var(--text);font-size:12px;width:190px;transition:border-color .1s}
.filter-input:focus{outline:none;border-color:var(--blue)}
.filter-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--rmd);color:var(--text4);padding:5px 11px;font-size:12px;transition:all .1s}
.filter-btn:hover,.filter-btn.active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.count-label{font-size:11px;color:var(--text4);font-family:var(--mono)}

/* ─── PROGRESS ────────────────────────────────────────────────────────────── */
.progress{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ─── DETAIL PANEL ────────────────────────────────────────────────────────── */
.detail-panel{background:var(--bg);border-left:1px solid var(--border);width:300px;min-width:300px;display:flex;flex-direction:column;overflow-y:auto}
.dp-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.dp-close{background:transparent;border:none;color:var(--text4);font-size:18px;cursor:pointer;margin-left:auto;line-height:1;transition:color .1s}
.dp-close:hover{color:var(--text)}
.dp-section{padding:10px 16px;border-bottom:1px solid var(--border)}
.dp-label{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;font-family:var(--mono);font-weight:600}
.dp-val{font-size:12.5px;color:var(--text)}
.dp-mono{font-family:var(--mono);font-size:11px;color:var(--blue)}

/* ─── MODAL ───────────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(17,24,39,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--rxl);width:540px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hdr{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.modal-close{margin-left:auto;background:transparent;border:none;color:var(--text4);font-size:20px;cursor:pointer;transition:color .1s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text4);font-weight:600;margin-bottom:5px;display:block;letter-spacing:.2px}
.form-input{background:var(--bg);border:1px solid var(--border);border-radius:var(--rmd);padding:7px 11px;color:var(--text);font-size:12.5px;width:100%;transition:border-color .1s}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-bg)}
.form-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--rmd);padding:7px 11px;color:var(--text);font-size:12.5px;width:100%;cursor:pointer}
.form-select:focus{outline:none;border-color:var(--blue)}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ─── BUTTONS ─────────────────────────────────────────────────────────────── */
.btn-primary{background:var(--blue);border:none;border-radius:var(--rmd);color:#fff;padding:7px 18px;font-size:12.5px;font-weight:600;transition:background .1s;display:inline-flex;align-items:center;gap:5px}
.btn-primary:hover{background:var(--blue-hover)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:var(--bg);border:1px solid var(--border);border-radius:var(--rmd);color:var(--text4);padding:7px 16px;font-size:12.5px;font-weight:500;transition:all .1s;display:inline-flex;align-items:center;gap:5px}
.btn-ghost:hover{border-color:var(--border2);background:var(--bg3)}
.btn-danger{background:var(--err-bg);border:1px solid var(--err-border);border-radius:var(--rmd);color:var(--err);padding:7px 16px;font-size:12.5px;font-weight:500;transition:all .1s;display:inline-flex;align-items:center;gap:5px}
.btn-danger:hover{background:var(--err);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px;border-radius:var(--r)}
.btn-icon{background:transparent;border:none;color:var(--text4);padding:4px;cursor:pointer;border-radius:var(--r);display:flex;align-items:center;justify-content:center;transition:all .1s}
.btn-icon:hover{color:var(--blue);background:var(--blue-bg)}
.btn-icon-err:hover{color:var(--err);background:var(--err-bg)}

/* ─── PAGE HEADER ─────────────────────────────────────────────────────────── */
.page-hdr{margin-bottom:16px;display:flex;align-items:flex-end;justify-content:space-between}
.page-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-.5px}
.page-sub{font-size:12px;color:var(--text4)}
.page-actions{display:flex;gap:8px}

/* ─── TABS ────────────────────────────────────────────────────────────────── */
.tabs{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rmd);padding:3px;margin-bottom:14px;width:fit-content}
.tab{padding:5px 13px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--text4);cursor:pointer;transition:all .1s;border:none;background:transparent}
.tab.active{background:var(--bg);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ─── TOAST ───────────────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:18px;right:18px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rlg);padding:11px 16px;font-size:12.5px;z-index:200;display:flex;align-items:center;gap:9px;animation:toastIn .2s ease;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,.1)}
@keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-ok{border-color:var(--ok-border)}
.toast-err{border-color:var(--err-border)}

/* ─── QUEUE ITEMS ─────────────────────────────────────────────────────────── */
.queue-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--rlg);padding:12px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:border-color .1s,box-shadow .1s}
.queue-item:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.queue-item.critical{border-color:var(--err-border);background:var(--err-bg)}
.queue-item.high{border-color:var(--warn-border)}
.attempt-dots{display:flex;gap:3px;margin-top:4px}
.adot{width:7px;height:7px;border-radius:50%;background:var(--bg3)}
.adot.used{background:var(--err)}
.adot.ok{background:var(--ok)}

/* ─── SYNC MONITOR ────────────────────────────────────────────────────────── */
.sync-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.sync-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rlg);padding:12px;transition:all .1s}
.sync-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sync-ch-name{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:var(--text)}
.sync-metric{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sync-metric-label{font-size:10px;color:var(--text4);font-family:var(--mono)}
.sync-metric-val{font-family:var(--mono);font-size:11px;color:var(--text4)}

/* ─── CHART ───────────────────────────────────────────────────────────────── */
.chart-wrap{display:flex;align-items:flex-end;gap:4px;height:140px;padding:0 4px}
.cb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.cb-outer{width:100%;background:var(--bg3);border-radius:3px;overflow:hidden;flex:1;position:relative}
.cb-inner{position:absolute;bottom:0;left:0;right:0;border-radius:3px 3px 0 0;transition:height .5s ease}
.cb-label{font-family:var(--mono);font-size:9px;color:var(--text4)}
.cb-val{font-family:var(--mono);font-size:9px}
.area-chart{width:100%;height:120px}

/* ─── TIMELINE ────────────────────────────────────────────────────────────── */
.tl-item{display:flex;gap:10px;padding:7px 14px;align-items:flex-start}
.tl-dot{width:7px;height:7px;border-radius:50%;margin-top:3px;flex-shrink:0}
.tl-action{font-size:12px;color:var(--text);margin-bottom:2px;line-height:1.4}
.tl-meta{font-size:10px;color:var(--text4);display:flex;gap:8px;font-family:var(--mono)}

/* ─── SEVERITY ─────────────────────────────────────────────────────────────── */
.sev-high{color:var(--err)}
.sev-med{color:var(--warn)}
.sev-low{color:var(--ok)}
.diff-pos{color:var(--err);font-family:var(--mono);font-size:11px}
.diff-neg{color:var(--warn);font-family:var(--mono);font-size:11px}

/* ─── SETTINGS ────────────────────────────────────────────────────────────── */
.settings-section{background:var(--bg);border:1px solid var(--border);border-radius:var(--rxl);margin-bottom:12px;overflow:hidden}
.settings-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.settings-body{padding:18px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-key{font-size:12.5px;color:var(--text);font-weight:500}
.settings-desc{font-size:11px;color:var(--text4);margin-top:2px}
.toggle{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
.toggle.on{background:var(--blue)}
.toggle.off{background:var(--bg4)}
.toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* ─── EMPTY STATE ─────────────────────────────────────────────────────────── */

.empty-title{font-size:13px;font-weight:500;margin-bottom:3px;color:var(--text4)}
.empty-sub{font-size:11px;text-align:center}

const {useState,useEffect,useMemo,useCallback,useRef} = React;

// ─── DATA ────────────────────────────────────────────────────────────────────

const JOBS=[];

// ─── ICONS ────────────────────────────────────────────────────────────────────
const ICON_PATHS={
  dashboard:<><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></>,
  scheduler:<><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 15.5"/></>,
  discrepancy:<><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
  retry:<><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></>,
  sync:<><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></>,
  audit:<><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
  settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></>,
  refresh:<><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></>,
  plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
  play:<><polygon points="5 3 19 12 5 21 5 3"/></>,
  pause:<><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></>,
  x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
  check:<><polyline points="20 6 9 17 4 12"/></>,
  chevron:<><polyline points="9 18 15 12 9 6"/></>,
  bell:<><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></>,
  package:<><line x1="16.5" y1="9.4" x2="7.55" y2="4.24"/><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>,
  zap:<><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></>,
  database:<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>,
  eye:<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
  filter:<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
  trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
  edit:<><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
  link:<><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></>,
  search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
  cpu:<><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></>,
  mail:<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,
  upload:<><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></>,
  download:<><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.11"/></>,
  layers:<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
};
const Icon=({name,size=16,color='currentColor'})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{ICON_PATHS[name]||null}</svg>;

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const ChBadge=({ch})=>{const cls={Shopee:'ch-shopee',Lazada:'ch-lazada',Zalora:'ch-zalora',Shopify:'ch-shopify',Magento:'ch-magento',Custom:'ch-custom'}[ch]||'badge-dim';return <span className={`badge ${cls}`}>{ch}</span>;};
const StatusBadge=({s})=>{if(s==='success'||s==='resolved')return<span className="badge badge-ok"><span className="dot dot-ok"/>  {s}</span>;if(s==='failed')return<span className="badge badge-err"><span className="dot dot-err"/>  {s}</span>;if(s==='escalated')return<span className="badge badge-err"><span className="dot dot-err"/>  {s}</span>;if(s==='open')return<span className="badge badge-warn"><span className="dot dot-warn"/>  {s}</span>;return<span className="badge badge-dim">{s}</span>;};
const Toast=({msg,type,onClose})=>{useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t);},[]);return<div className={`toast toast-${type}`}><Icon name={type==='ok'?'check':'x'} size={14} color={type==='ok'?'var(--ok)':'var(--err)'}/>{msg}</div>;};

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
const Sparkline=({data,color='var(--blue)',height=28})=>{const max=Math.max(...data,1);return<div style={{display:'flex',alignItems:'flex-end',gap:'2px',height:height+'px'}}>{data.map((v,i)=><div key={i} style={{flex:1,height:`${(v/max)*100}%`,background:color,borderRadius:'1px',opacity:.7,minHeight:'3px'}}/>)}</div>;};

// ─── INLINE AREA CHART ────────────────────────────────────────────────────────
const AreaChart=({data,color='#2563EB',height=120})=>{if(!data||data.length===0)return null;const max=Math.max(...data,1);const w=600,h=height-10;const pts=data.length===1?`0,${h-(data[0]/max)*h} ${w},${h-(data[0]/max)*h}`:data.map((v,i)=>`${(i/(data.length-1))*w},${h-(v/max)*h}`).join(' ');const polyline=`0,${h} ${pts} ${w},${h}`;return<svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{width:'100%',height:height+'px'}}><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs><polygon points={polyline} fill="url(#ag)"/><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/></svg>;};

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
// ─── INVENTORY CHECK ──────────────────────────────────────────────────────────
function InventoryCheck({showToast}){
  const [dragOver,setDragOver]=useState(false);
  const [files,setFiles]=useState([]);
  const [jobId,setJobId]=useState(null);
  const [fileSummary,setFileSummary]=useState([]);
  const [sources,setSources]=useState([]);
  const [step,setStep]=useState('upload');
  const [progress,setProgress]=useState('');
  const [downloadUrl,setDownloadUrl]=useState(null);
  const [warnings,setWarnings]=useState([]);
  const [error,setError]=useState(null);
  const [skuSource,setSkuSource]=useState('');
  const [skuCol,setSkuCol]=useState({});
  const [outputCols,setOutputCols]=useState([]);
  const [comparisons,setComparisons]=useState([]);
  const [draggingCol,setDraggingCol]=useState(null);
  const [dragOverSlot,setDragOverSlot]=useState(null);

  const srcColor={'channel_shopee':'#3B82F6','channel_lazada':'#3B82F6','channel_zalora':'#3B82F6',ordazzle:'#10B981',sap:'#F59E0B'};
  const srcLabel={'channel_shopee':'Shopee','channel_lazada':'Lazada','channel_zalora':'Zalora',ordazzle:'Ordazzle',sap:'SAP'};
  const typeColor={channel:'#3B82F6',ordazzle:'#10B981',sap:'#F59E0B'};

  const addFiles=(incoming)=>setFiles(f=>[...f,...Array.from(incoming).filter(n=>!f.find(x=>x.name===n.name&&x.size===n.size))]);
  const removeFile=(idx)=>setFiles(f=>f.filter((_,i)=>i!==idx));
  const handleFileDrop=(e)=>{e.preventDefault();setDragOver(false);addFiles(e.dataTransfer.files);};
  const totalFiles=files.length;

  const handleUpload=async()=>{
    if(!totalFiles){setError('Please add at least one file.');return;}
    setError(null);setStep('running');setProgress('Uploading files\u2026');
    const fd=new FormData();
    files.forEach(f=>fd.append('channel_files',f));
    try{
      const r=await fetch('/api/check/upload',{method:'POST',body:fd});
      const d=await r.json();
      if(d.error){setError(d.error);setStep('upload');return;}
      setJobId(d.job_id);setFileSummary(d.files||[]);
      setProgress('Scanning columns\u2026');
      const sr=await fetch('/api/check/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:d.job_id})});
      const sd=await sr.json();
      if(sd.error){setError(sd.error);setStep('upload');return;}
      const srcs=sd.sources||[];
      setSources(srcs);
      const initSkuCol={};
      const initOutputCols=[];
      srcs.forEach(s=>{
        const cols=s.columns||[];
        initSkuCol[s.source]=cols[0]||'';
        cols.forEach(c=>initOutputCols.push({source:s.source,col:c,id:s.source+'__'+c}));
      });
      setSkuCol(initSkuCol);
      setSkuSource(srcs[0]?.source||'');
      setOutputCols(initOutputCols);
      setComparisons([]);
      setStep('columns');setProgress('');
    }catch(e){setError('Upload failed: '+e.message);setStep('upload');}
  };

  const handleRun=async()=>{
    if(!jobId)return;
    setStep('running');setProgress('Running comparison\u2026');setError(null);
    const selected_output_cols=outputCols.map(({source,col})=>({source,col}));
    const comps=comparisons.map(c=>([c.lSrc,c.lCol,c.rSrc,c.rCol,c.label||`${c.lCol} = ${c.rCol}`]));
    try{
      const r=await fetch('/api/check/run',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({job_id:jobId,base_sku:skuSource,selected_output_cols,comparisons:comps})});
      const d=await r.json();
      if(d.error){setError(d.error);setStep('columns');return;}
      setDownloadUrl(d.download_url||null);
      setWarnings(d.warnings||[]);
      setStep('done');setProgress('');
      showToast(`Comparison complete \u2014 ${d.files_processed} file(s) processed`,'ok');
    }catch(e){setError('Run failed: '+e.message);setStep('columns');}
  };

  const reset=()=>{
    setFiles([]);setJobId(null);setFileSummary([]);setSources([]);
    setSkuSource('');setSkuCol({});setOutputCols([]);setComparisons([]);
    setStep('upload');setProgress('');setDownloadUrl(null);setWarnings([]);setError(null);
  };

  const onColDragStart=(source,col)=>setDraggingCol({source,col});
  const onColDragEnd=()=>{setDraggingCol(null);setDragOverSlot(null);};

  const onOutputDrop=(e)=>{
    e.preventDefault();
    if(!draggingCol)return;
    const key=draggingCol.source+'__'+draggingCol.col;
    if(outputCols.find(o=>o.source===draggingCol.source&&o.col===draggingCol.col))return;
    setOutputCols(c=>[...c,{...draggingCol,id:key}]);
    setDraggingCol(null);setDragOverSlot(null);
  };

  const onSlotDrop=(e,toIdx)=>{
    e.preventDefault();e.stopPropagation();
    if(!draggingCol)return;
    const fromIdx=outputCols.findIndex(o=>o.source===draggingCol.source&&o.col===draggingCol.col);
    if(fromIdx===-1){
      const key=draggingCol.source+'__'+draggingCol.col;
      if(outputCols.find(o=>o.id===key))return;
      const next=[...outputCols];
      next.splice(toIdx,0,{...draggingCol,id:key});
      setOutputCols(next);
    }else{
      const next=[...outputCols];
      const [item]=next.splice(fromIdx,1);
      next.splice(toIdx,0,item);
      setOutputCols(next);
    }
    setDraggingCol(null);setDragOverSlot(null);
  };

  const removeOutputCol=(id)=>setOutputCols(c=>c.filter(o=>o.id!==id));

  const addComparison=()=>setComparisons(c=>{
    const src0=sources[0]?.source||'';
    const src1=sources[1]?.source||src0;
    const col0=sources[0]?.columns[0]||'';
    const col1=sources[1]?.columns[0]||col0;
    return[...c,{id:Date.now(),lSrc:src0,lCol:col0,rSrc:src1,rCol:col1,label:''}];
  });
  const removeComparison=(id)=>setComparisons(c=>c.filter(x=>x.id!==id));
  const updateComparison=(id,field,val)=>setComparisons(c=>c.map(x=>x.id===id?{...x,[field]:val}:x));
  const colsFor=(source)=>sources.find(s=>s.source===source)?.columns||[];

  const pillStyle=(source)=>({
    display:'inline-flex',alignItems:'center',gap:4,
    padding:'3px 9px',borderRadius:20,
    border:`1px solid ${srcColor[source]||'var(--border)'}33`,
    background:`${srcColor[source]||'#888'}15`,
    color:srcColor[source]||'var(--text)',
    fontSize:11,fontFamily:'var(--mono)',fontWeight:600,
    cursor:'grab',userSelect:'none',whiteSpace:'nowrap',
  });
  const selStyle={padding:'5px 8px',borderRadius:'var(--rmd)',border:'1px solid var(--border)',
    background:'var(--bg2)',color:'var(--text)',fontSize:'11px',fontFamily:'var(--mono)'};

  return<>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
      <div>
        <div style={{fontSize:'17px',fontWeight:800,color:'var(--text)',letterSpacing:'-.4px'}}>Inventory Check</div>
        <div style={{fontSize:'11px',color:'var(--text4)',marginTop:'2px'}}>Drop all your files here — channel, Ordazzle, SAP, or ZIP. Auto-detected.</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
        {['upload','columns','done'].map((s,i)=><React.Fragment key={s}>
          <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
            <div style={{width:'20px',height:'20px',borderRadius:'50%',
              background:step===s||(step==='running'&&i===1)?'var(--blue)':step==='done'?'var(--ok)':'var(--bg3)',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',
              fontFamily:'var(--mono)',color:step===s||step==='done'?'#fff':'var(--text4)',fontWeight:700,transition:'all .2s'
            }}>{i+1}</div>
            <span style={{fontSize:'10px',color:step===s?'var(--text)':'var(--text4)',fontWeight:step===s?700:400}}>
              {['Upload','Build Report','Done'][i]}
            </span>
          </div>
          {i<2&&<div style={{width:'20px',height:'1px',background:'var(--border)'}}/>}
        </React.Fragment>)}
        {step!=='upload'&&<button className="tb-btn-ghost" onClick={reset} style={{fontSize:'12px',marginLeft:'8px'}}>\u21a9 Start over</button>}
      </div>
    </div>

    {error&&<div style={{background:'var(--err-bg)',border:'1px solid var(--err-border)',borderRadius:'var(--rmd)',padding:'10px 14px',marginBottom:'14px',fontSize:'12px',color:'var(--err)',display:'flex',alignItems:'center',gap:'8px'}}><Icon name="x" size={13}/>{error}</div>}

    {step==='upload'&&<>
      <div
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={handleFileDrop}
        onClick={()=>document.getElementById('fi-all').click()}
        style={{border:`2px dashed ${dragOver?'var(--blue)':'var(--border)'}`,borderRadius:'var(--rxl)',
          padding:'36px 24px',textAlign:'center',cursor:'pointer',marginBottom:'14px',
          background:dragOver?'var(--blue-bg)':'var(--bg2)',transition:'all .15s',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'10px'}}
      >
        <div style={{width:'42px',height:'42px',borderRadius:'50%',background:dragOver?'var(--blue-bg)':'var(--bg3)',
          display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${dragOver?'var(--blue)':'var(--border)'}`}}>
          <Icon name="upload" size={18} color={dragOver?'var(--blue)':'var(--text4)'}/>
        </div>
        <div>
          <div style={{fontSize:'13px',fontWeight:700,color:dragOver?'var(--blue)':'var(--text)'}}>Drop all files here</div>
          <div style={{fontSize:'11px',color:'var(--text4)',marginTop:'4px'}}>Shopee · Lazada · Zalora · Ordazzle · SAP · ZIP — all accepted</div>
        </div>
        <div style={{fontSize:'11px',color:'var(--text4)',border:'1px solid var(--border)',borderRadius:'var(--rmd)',padding:'3px 10px',background:'var(--bg)'}}>
          or click to browse
        </div>
      </div>
      <input id="fi-all" type="file" multiple accept=".xlsx,.csv,.zip" style={{display:'none'}} onChange={e=>{addFiles(e.target.files);e.target.value='';}}/>
      {files.length>0&&<div style={{marginBottom:'14px',display:'flex',flexDirection:'column',gap:'4px'}}>
        {files.map((f,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rmd)',fontSize:'11px'}}>
          <Icon name="file" size={12} color="var(--text4)"/>
          <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text)'}}>{f.name}</span>
          <span style={{color:'var(--text4)',fontFamily:'var(--mono)',flexShrink:0,fontSize:10}}>{(f.size/1024).toFixed(0)}KB</span>
          <button onClick={e=>{e.stopPropagation();removeFile(i);}} style={{background:'none',border:'none',color:'var(--text4)',cursor:'pointer',padding:0}}><Icon name="x" size={11}/></button>
        </div>)}
      </div>}

function DonutChart({segments,total,label}){
  const r=54,cx=64,cy=64,circ=2*Math.PI*r;
  let offset=0;
  const slices=segments.map(s=>{const dash=(s.pct/100)*circ;const el=<circle key={s.label} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="16" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-offset} style={{transform:'rotate(-90deg)',transformOrigin:'64px 64px'}}/>;offset+=dash;return el;});
  return<svg viewBox="0 0 128 128" style={{width:'128px',height:'128px',flexShrink:0}}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bg3)" strokeWidth="16"/>
    {slices}
    <text x={cx} y={cy-6} textAnchor="middle" style={{fontSize:'13px',fontWeight:700,fill:'var(--text)',fontFamily:'var(--mono)'}}>{total.toLocaleString()}</text>
    <text x={cx} y={cy+10} textAnchor="middle" style={{fontSize:'8px',fill:'var(--text4)',fontFamily:'var(--sans)'}}>{label}</text>
  </svg>;
}

function MiniBarChart({data,color='#2563EB',height=80}){
  const max=Math.max(...data.map(d=>d.v),1);
  return<div style={{display:'flex',alignItems:'flex-end',gap:'3px',height:height+'px',width:'100%'}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',height:'100%',justifyContent:'flex-end'}}>
      <div style={{width:'100%',borderRadius:'2px 2px 0 0',background:d.highlight?color:'var(--bg4)',height:Math.max(4,(d.v/max)*100)+'%',transition:'height .3s'}}/>
    </div>)}
  </div>;
}

function Treemap({items,height=180}){
  if(!items||!items.length)return null;
  const total=items.reduce((s,i)=>s+i.v,0);
  const colors=['#1e3a5f','#2e6fad','#3b8cc4','#c0392b','#8e44ad','#16a085','#d35400','#2980b9'];
  let x=0;
  return<div style={{position:'relative',height:height+'px',display:'flex',borderRadius:'var(--rmd)',overflow:'hidden',gap:'2px'}}>
    {items.map((item,i)=>{const w=(item.v/total)*100;return<div key={i} style={{background:colors[i%colors.length],width:w+'%',height:'100%',position:'relative',display:'flex',flexDirection:'column',justifyContent:'flex-end',padding:'8px',flexShrink:0}}>
      <div style={{fontSize:'10px',color:'rgba(255,255,255,.7)',fontWeight:600,letterSpacing:'.3px'}}>{item.label}</div>
      <div style={{fontSize:'12px',color:'#fff',fontFamily:'var(--mono)',fontWeight:700}}>{item.v.toLocaleString()}</div>
    </div>;})}
  </div>;
}

function Dashboard({jobs,discrepancies,retryQueue}){
  const [metrics,setMetrics]=useState(null);
  useEffect(()=>{fetch('/api/metrics').then(r=>r.json()).then(setMetrics).catch(()=>{});},[]);

  const active=jobs.filter(j=>j.active).length;
  const failed=jobs.filter(j=>j.lastStatus==='failed').length;
  const openDisc=discrepancies.filter(d=>['open','escalated'].includes(d.status)).length;
  const totalSkus=metrics?.total_skus??0;
  const totalPulls=metrics?.total_pulls??0;
  const throughputData=metrics?.throughput_data?.length>0?metrics.throughput_data.map((v,i)=>({v,highlight:i===metrics.throughput_data.length-1})):[{v:0}];
  const successRate=metrics?.success_rate??0;
  const recentActivity=metrics?.recent_activity??[];

  // Donut: job status breakdown
  const jobTotal=jobs.length||1;
  const jobSegments=[
    {label:'Active',pct:Math.round((active/jobTotal)*100),color:'#2563EB'},
    {label:'Failed',pct:Math.round((failed/jobTotal)*100),color:'#DC2626'},
    {label:'Idle',pct:Math.max(0,100-Math.round((active/jobTotal)*100)-Math.round((failed/jobTotal)*100)),color:'#E2E6EE'},
  ];

  // Donut: discrepancy severity
  const high=discrepancies.filter(d=>d.severity==='high').length;
  const med=discrepancies.filter(d=>d.severity==='medium').length;
  const low=discrepancies.filter(d=>d.severity==='low').length;
  const discTotal=discrepancies.length||1;
  const discSegments=[
    {label:'High',pct:Math.round((high/discTotal)*100),color:'#DC2626'},
    {label:'Med',pct:Math.round((med/discTotal)*100),color:'#D97706'},
    {label:'Low',pct:Math.round((low/discTotal)*100),color:'#16A34A'},
  ];

  // Channel treemap data
  const chData=CHANNELS.map(ch=>({label:ch,v:jobs.filter(j=>j.channel===ch).length})).filter(d=>d.v>0);
  if(!chData.length)CHANNELS.forEach((ch,i)=>chData.push({label:ch,v:Math.floor(Math.random()*10)+1}));

  return<>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
      <div>
        <div style={{fontSize:'17px',fontWeight:800,color:'var(--text)',letterSpacing:'-.4px'}}>Operations Dashboard</div>
        <div style={{fontSize:'11px',color:'var(--text4)',marginTop:'2px'}}>Live inventory sync overview</div>
      </div>
      <div style={{display:'flex',gap:'6px'}}>
        {[['Shopee','ch-shopee'],['Lazada','ch-lazada'],['Zalora','ch-zalora']].map(([ch,cls])=><span key={ch} className={`badge ${cls}`}>{ch}</span>)}
      </div>
    </div>

    {/* KPI row */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'14px'}}>
      {[
        {label:'Active Jobs',val:active,sub:`of ${jobs.length} total`,color:'var(--blue)',bg:'var(--blue-bg)'},
        {label:'Failed Jobs',val:failed,sub:failed>0?'Needs attention':'All healthy',color:failed>0?'var(--err)':'var(--ok)',bg:failed>0?'var(--err-bg)':'var(--ok-bg)'},
        {label:'Open Discrepancies',val:openDisc,sub:`${high} high severity`,color:openDisc>0?'var(--warn)':'var(--ok)',bg:'var(--warn-bg)'},
        {label:'SKUs Pulled',val:totalSkus.toLocaleString(),sub:`${totalPulls} pulls logged`,color:'var(--blue)',bg:'var(--blue-bg)'},
      ].map(({label,val,sub,color,bg})=><div key={label} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rxl)',padding:'14px 16px',borderTop:`3px solid ${color}`}}>
        <div style={{fontSize:'11px',color:'var(--text4)',fontWeight:600,marginBottom:'8px'}}>{label}</div>
        <div style={{fontFamily:'var(--mono)',fontSize:'28px',fontWeight:600,color,lineHeight:1,marginBottom:'5px'}}>{val}</div>
        <div style={{fontSize:'11px',color:'var(--text4)'}}>{sub}</div>
      </div>)}
    </div>

    {/* Row 2: Area chart + Job Status Donut */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:'10px',marginBottom:'10px'}}>
      <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rxl)',padding:'16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'14px'}}>
          <div>
            <div style={{fontSize:'12px',fontWeight:700,color:'var(--text)'}}>Pull Throughput</div>
            <div style={{fontSize:'11px',color:'var(--text4)',marginTop:'2px'}}>SKU rows per sync run</div>

        </div>
        <div style={{display:'flex',gap:'20px',marginBottom:'14px'}}>
          {[[totalSkus.toLocaleString(),'Total SKUs','var(--blue)'],[totalPulls,'Total Pulls','var(--text)'],[successRate+'%','Success Rate','var(--ok)']].map(([v,l,c])=><div key={l}><div style={{fontFamily:'var(--mono)',fontSize:'22px',color:c,lineHeight:1,fontWeight:600}}>{v}</div><div style={{fontSize:'10px',color:'var(--text4)',marginTop:'3px'}}>{l}</div></div>)}

// ── CSV export ────────────────────────────────────────────────────────────────
function exportJobsCSV(jobs) {
  const cols = ['id','jobName','channel','shop','fn','freq','active','lastExec','lastStatus','startDate','endDate','brand','notifyOnFail'];
  const rows = [cols.join(','), ...jobs.map(j => cols.map(c => `"${(j[c]??'').toString().replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `oms_jobs_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function JobScheduler({ showToast }) {
  const [marketplaces, setMarketplaces] = useState([]);
  const [pullHistory, setPullHistory] = useState([]);
  const [batchStatus, setBatchStatus] = useState({
    state: 'idle',         // idle | ok | err | running
    lastRunAt: '',
    lastJob: '',
    rows: 0,
    message: 'No batch runs yet.',
  });
  const [loading, setLoading] = useState(true);
  const [allJobs, setAllJobs] = useState([]);
  const [search, setSearch] = useState('');
  const [tabCh, setTabCh] = useState('All');
  const [filterStatus, setFilterStatus] = useState('All');
  const [selected, setSelected] = useState(null);
  const [selectedIds, setSelectedIds] = useState([]);
  const [modalJob, setModalJob] = useState(null);
  const [running, setRunning] = useState({});
  const [expandedHistory, setExpandedHistory] = useState({});

  const fmtInterval = (h) => {
    if (!h) return '—';
    if (h < 1) return `Every ${Math.round(h * 60)}m`;
    if (h === 24) return 'Daily';
    return `Every ${h}h`;
  };

  const channelOf = (job) => {
    if (job.channel) return job.channel;
    if (job.mp_type) return job.mp_type.charAt(0).toUpperCase() + job.mp_type.slice(1);
    return 'Custom';
  };

  const statusOf = (job) => (job.active !== undefined ? job.active : job.enabled !== false);

  const load = () => {
    setLoading(true);
    Promise.all([
      fetch('/api/settings').then(r => r.json()).catch(() => ({ marketplaces: [], pull_schedules: [] })),
      fetch('/api/zalora/history').then(r => r.json()).catch(() => ({ history: [] })),
      fetch('/api/zalora/runs/status').then(r => r.json()).catch(() => ({ running_by_mp: {}, latest_by_mp: {} })),
      fetch('/api/jobs').then(r => r.json()).catch(() => ([])),
    ]).then(([s, ph, runState, dbJobs]) => {
      const mps = s.marketplaces || [];
      setMarketplaces(mps);
      setPullHistory(ph.history || []);

      const runningByMp = runState.running_by_mp || {};
      const latestByMp = runState.latest_by_mp || {};
      const zaloraJobs = (s.pull_schedules || []).map(sc => {
        const mp = mps.find(m => m.id === sc.mp_id) || {};
        const freq = SCHED_FREQS.find(f => Math.abs(f.hours - sc.interval_hours) < 0.01);
        const mpRun = latestByMp[sc.mp_id] || {};
        const isRunning = !!runningByMp[sc.mp_id];
        const derivedStatus = isRunning ? 'running' : (mpRun.status || (sc.last_run ? 'success' : null));
        const derivedExec = isRunning ? (mpRun.started_at || sc.last_run || null) : (mpRun.finished_at || sc.last_run || null);
        return {
          id: `z-${sc.mp_id}`, mp_id: sc.mp_id, mp_type: 'zalora',
          jobName: `Zalora-${(mp.brand || sc.mp_id).replace(/\s+/g,'')}-AutoPull`,
          channel: 'Zalora', shop: mp.name || sc.mp_id,
          fn: 'Zalora Inventory Pull',
          freq: freq ? freq.label : `Every ${sc.interval_hours}h`,
          interval_hours: sc.interval_hours,
          active: sc.enabled !== false, enabled: sc.enabled !== false,
          startDate: '', endDate: '',
          desc: `Auto-pull schedule for ${mp.name || sc.mp_id}`,
          notifyOnFail: false, notifyUsers: [], brand: mp.brand || '',
          lastExec: derivedExec,
          lastStatus: derivedStatus,
          source: 'zalora_schedule',
        };
      });

      const mappedDbJobs = (dbJobs || []).map(j => {
        const channel = j.channel || '';
        const brand = j.brand || '';
        const shop = j.shop || '';
        let mp_id = j.mp_id || null;
        if (!mp_id && channel.toLowerCase() === 'zalora') {
          const byShop = mps.find(m => (m.type || '').toLowerCase() === 'zalora' && (m.name || '').toLowerCase() === shop.toLowerCase());
          const byBrand = mps.find(m => (m.type || '').toLowerCase() === 'zalora' && (m.brand || '').toLowerCase() === brand.toLowerCase());
          mp_id = (byShop || byBrand || {}).id || null;
        }
        const mpRun = mp_id ? (latestByMp[mp_id] || {}) : {};
        const isRunning = mp_id ? !!runningByMp[mp_id] : false;
        return {
          id: j.id,
          jobName: j.job_name || j.jobName || '',
          channel,
          shop,
          fn: j.fn || '',
          freq: j.freq || 'Every 5 mins',
          active: j.active !== false,
          enabled: j.active !== false,
          startDate: j.start_date || j.startDate || '',
          endDate: '',
          desc: '',
          notifyOnFail: !!(j.notify_on_fail ?? j.notifyOnFail),
          notifyUsers: j.notify_users || j.notifyUsers || [],
          brand,
          mp_id,
          lastExec: isRunning ? (mpRun.started_at || j.last_exec || j.lastExec || null) : (j.last_exec || j.lastExec || mpRun.finished_at || null),
          lastStatus: isRunning ? 'running' : (j.last_status || j.lastStatus || mpRun.status || null),
          source: 'db',
        };
      });

      const mergedJobs = [...zaloraJobs, ...mappedDbJobs];
      setAllJobs(mergedJobs);

      const latestPull = (ph.history || [])[0];
      const failed = mergedJobs
        .filter(j => (j.lastStatus || '').toLowerCase() === 'failed')
        .sort((a, b) => String(b.lastExec || '').localeCompare(String(a.lastExec || '')))[0];
      const runningNow = Object.keys(runningByMp || {}).length > 0;
      if (runningNow) {
        setBatchStatus({
          state: 'running',
          lastRunAt: latestPull?.pulled_at || '',
          lastJob: latestPull?.brand ? `Zalora ${latestPull.brand}` : 'Batch job',
          rows: Number(latestPull?.rows || 0),
          message: 'Batch job is running now…',
        });
      } else if (failed) {
        setBatchStatus({
          state: 'err',
          lastRunAt: failed.lastExec || '',
          lastJob: failed.jobName || failed.fn || 'Batch job',
          rows: 0,
          message: 'Last run reported failed. Check mapping/credentials and retry.',
        });
      } else if (latestPull) {
        setBatchStatus({
          state: 'ok',
          lastRunAt: latestPull.pulled_at || '',
          lastJob: latestPull.brand ? `Zalora ${latestPull.brand}` : 'Zalora Inventory Sync',
          rows: Number(latestPull.rows || 0),
          message: 'Last batch pull completed successfully.',
        });
      } else {
        setBatchStatus({
          state: 'idle',
          lastRunAt: '',
          lastJob: '',
          rows: 0,
          message: 'No batch runs yet.',
        });
      }
      setLoading(false);
    });
  };

  useEffect(load, []);

  const displayed = useMemo(() => allJobs.filter(j => {
    if (tabCh !== 'All' && channelOf(j).toLowerCase() !== tabCh.toLowerCase()) return false;
    if (filterStatus === 'active' && !statusOf(j)) return false;
    if (filterStatus === 'inactive' && statusOf(j)) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!(j.jobName||'').toLowerCase().includes(q) &&
          !(j.shop||'').toLowerCase().includes(q) &&
          !(j.fn||'').toLowerCase().includes(q) &&
          !(j.brand||'').toLowerCase().includes(q)) return false;
    }
    return true;
  }), [allJobs, tabCh, filterStatus, search]);

  const toggleJob = async (job) => {
    if (job.source === 'zalora_schedule') {
      try {
        const r = await fetch(`/api/settings/schedules/${job.mp_id}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: !job.active }),
        });
        if (!r.ok) throw new Error('API error');
        showToast(`Schedule ${job.active ? 'paused' : 'resumed'}`, 'ok');
        load();
      } catch (e) { showToast(e.message, 'err'); }
    } else {
      try {
        const updated = allJobs.map(j => j.id === job.id ? { ...j, active: !j.active } : j);
        const toggled = updated.find(j => j.id === job.id);
        if (job.id && !String(job.id).startsWith('e-') && !String(job.id).startsWith('s-')) {
          await fetch(`/api/jobs/${job.id}`, {
            method: 'PUT', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ ...toggled, job_name: toggled.jobName, notify_on_fail: toggled.notifyOnFail, notify_users: toggled.notifyUsers, last_exec: toggled.lastExec, last_status: toggled.lastStatus, start_date: toggled.startDate })
          });
        }
        setAllJobs(updated);
        showToast(`Job ${job.active ? 'disabled' : 'enabled'}`, 'ok');
      } catch(e) { showToast(e.message, 'err'); }
    }
  };

  const deleteJob = async (job) => {
    if (!confirm(`Delete "${job.jobName}"?`)) return;
    if (job.source === 'zalora_schedule') {
      await fetch(`/api/settings/schedules/${job.mp_id}`, { method: 'DELETE' });
      showToast('Schedule deleted', 'ok'); load();
    } else {
      try {
        if (job.id && !String(job.id).startsWith('e-') && !String(job.id).startsWith('s-')) {
          await fetch(`/api/jobs/${job.id}`, { method: 'DELETE' });
        }
        const updated = allJobs.filter(j => j.id !== job.id);
        setAllJobs(updated);
        if (selected?.id === job.id) setSelected(null);
        showToast('Job deleted', 'ok');
      } catch(e) { showToast(e.message, 'err'); }
    }
  };

  const cloneJob = (job) => {
    setModalJob({ ...job, id: null, jobName: `${job.jobName}-copy`, source: 'extra', mp_id: null });
  };

  const saveJob = async (form) => {
    const isEdit = !!form.id;
    const isZalora = (form.channel || '').toLowerCase() === 'zalora' || /zalora/i.test(form.shop || '');
    if (form.source === 'zalora_schedule' || isZalora) {
      const mp = marketplaces.find(m =>
        (m.type || '').toLowerCase() === 'zalora' &&
        ((m.name || '').toLowerCase() === (form.shop || '').toLowerCase())
      ) || marketplaces.find(m =>
        (m.type || '').toLowerCase() === 'zalora' &&
        ((m.brand || '').toLowerCase() === (form.brand || '').toLowerCase())
      );
      if (!mp) { showToast('Marketplace not found for this shop', 'err'); return; }
      const body = {
        mp_id: mp.id,
        interval_hours: form.interval_hours,
        enabled: form.active,
        func: form.fn || 'Zalora Inventory Pull',
      };
      const url = isEdit ? `/api/settings/schedules/${mp.id}` : '/api/settings/schedules';
      try {
        const r = await fetch(url, { method: isEdit ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!r.ok) throw new Error('API error');
        showToast(isEdit ? 'Schedule updated' : 'Schedule created', 'ok'); load();
      } catch (e) { showToast(e.message, 'err'); return; }
    } else {
      const isNew = !form.id || String(form.id).startsWith('e-') || String(form.id).startsWith('s-');
      try {
        const payload = {
          job_name: form.jobName || form.job_name || '',
          channel: form.channel || '',
          shop: form.shop || '',
          fn: form.fn || '',
          freq: form.freq || 'Every 5 mins',
          active: form.active !== false,
          last_exec: form.lastExec || null,
          last_status: form.lastStatus || null,
          start_date: form.startDate || null,
          notify_on_fail: form.notifyOnFail || false,
          notify_users: form.notifyUsers || [],
          brand: form.brand || '',
        };
        let res;
        if (isNew) {
          res = await fetch('/api/jobs', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        } else {
          res = await fetch(`/api/jobs/${form.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        }
        if (!res.ok) throw new Error('API error');
        const saved = await res.json();
        const newJob = { ...form, id: saved.id || form.id, source: 'db' };
        const updated = isNew ? [newJob, ...allJobs] : allJobs.map(j => j.id === form.id ? newJob : j);
        setAllJobs(updated);
        showToast(isNew ? 'Job created' : 'Job updated', 'ok');
      } catch(e) { showToast(e.message, 'err'); return; }
    }
    setModalJob(null);
  };

  const resolveMpId = (job, channelType) => {
    if (job.mp_id) return job.mp_id;
    const match = marketplaces.find(m =>
      (m.type || '').toLowerCase() === channelType &&
      (
        ((job.shop || '').trim() && (m.name || '').trim().toLowerCase() === (job.shop || '').trim().toLowerCase()) ||
        ((job.brand || '').trim() && (m.brand || '').trim().toLowerCase() === (job.brand || '').trim().toLowerCase())
      )
    );
    return (match || {}).id;
  };

  const runMarketplacePull = (job, channelType, onDone) => {
    const resolvedMpId = resolveMpId(job, channelType);
    if (!resolvedMpId) {
      setRunning(r => { const n={...r}; delete n[job.id]; return n; });
      showToast(`Cannot run ${channelType} job: marketplace not found in API Settings.`, 'err');
      return;
    }
    fetch(`/api/${channelType}/pull`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mp_id: resolvedMpId }),
    }).then(r => r.json()).then(d => {
      if (!d.job_id) throw new Error('No job_id');
      const es = new EventSource(`/api/${channelType}/pull/${d.job_id}/stream`);
      es.addEventListener('done', () => {
        es.close();
        if (onDone) onDone();
        else {
          const now = new Date().toLocaleString('en-PH');
          setAllJobs(j => j.map(x => x.id === job.id ? { ...x, lastExec: now, lastStatus: 'success' } : x));
          setRunning(r => { const n={...r}; delete n[job.id]; return n; });
          showToast(`${job.jobName} completed`, 'ok');
          load();
        }
      });
      es.addEventListener('error', () => {
        es.close();
        setRunning(r => { const n={...r}; delete n[job.id]; return n; });
        showToast(`${job.jobName} failed`, 'err');
      });
    }).catch(e => {
      setRunning(r => { const n={...r}; delete n[job.id]; return n; });
      showToast(e.message, 'err');
    });
  };

  const runNow = (job) => {
    if (running[job.id]) return;
    setRunning(r => ({ ...r, [job.id]: true }));
    const ch = channelOf(job).toLowerCase();

    if (ch === 'zalora') {
      runMarketplacePull(job, 'zalora', () => {
        fetch('/api/jobs/unified-import/run', { method: 'POST' })
          .then(() => {
            const now = new Date().toLocaleString('en-PH');
            setAllJobs(j => j.map(x => x.id === job.id ? { ...x, lastExec: now, lastStatus: 'success' } : x));
            setRunning(r => { const n={...r}; delete n[job.id]; return n; });
            showToast(`${job.jobName} completed + Unified snapshot updated`, 'ok');
            load();
          })
          .catch(() => {
            const now = new Date().toLocaleString('en-PH');
            setAllJobs(j => j.map(x => x.id === job.id ? { ...x, lastExec: now, lastStatus: 'success' } : x));
            setRunning(r => { const n={...r}; delete n[job.id]; return n; });
            showToast(`${job.jobName} completed (snapshot refresh failed)`, 'warn');
            load();
          });
      });
      return;
    }

    if (ch === 'shopee' || ch === 'lazada') {
      runMarketplacePull(job, ch);
      return;
    }

    setRunning(r => { const n={...r}; delete n[job.id]; return n; });
    showToast(`${job.jobName}: use the scheduler or upload files in Inventory Check.`, 'warn');
  };

  const cleanupHiddenSchedules = async () => {
    if (!confirm('Remove hidden/orphan schedules that no longer map to configured marketplaces?')) return;
    try {
      const r = await fetch('/api/settings/schedules/cleanup', { method: 'POST' });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.error || 'Cleanup failed');
      showToast(`Cleaned ${d.removed || 0} hidden schedules`, 'ok');
      load();
    } catch (e) {
      showToast(e.message || 'Cleanup failed', 'err');
    }
  };

  const toggleSelectAll = () =>
    setSelectedIds(selectedIds.length === displayed.length ? [] : displayed.map(j => j.id));

  const bulkEnable = () => {
    const updated = allJobs.map(j => selectedIds.includes(j.id) ? { ...j, active: true, enabled: true } : j);
    setAllJobs(updated);
    setSelectedIds([]); showToast(`${selectedIds.length} jobs enabled`, 'ok');
  };
  const bulkDisable = () => {
    const updated = allJobs.map(j => selectedIds.includes(j.id) ? { ...j, active: false, enabled: false } : j);
    setAllJobs(updated);
    setSelectedIds([]); showToast(`${selectedIds.length} jobs disabled`, 'ok');
  };

  const histForJob = (job) => {
    if (job.source === 'zalora_schedule' && job.mp_id)
      return pullHistory.filter(p => p.mp_id === job.mp_id).slice(0, 5);
    return pullHistory.filter(p => (p.brand||'').toLowerCase() === (job.brand||'').toLowerCase()).slice(0, 5);
  };

  const kpiActive   = allJobs.filter(j => statusOf(j)).length;
  const kpiInactive = allJobs.filter(j => !statusOf(j)).length;
  const kpiFailed   = allJobs.filter(j => j.lastStatus === 'failed').length;
  const kpiRunning  = Object.keys(running).length;

  const tabCounts = useMemo(() => {
    const counts = { All: allJobs.length };
    ['Zalora','Shopee','Lazada','Shopify','Magento','Custom'].forEach(ch => {
      counts[ch] = allJobs.filter(j => channelOf(j).toLowerCase() === ch.toLowerCase()).length;
    });
    return counts;
  }, [allJobs]);

  return (
    <div className="panel-layout">
      <div className="panel-main">

        {/* Page header */}
        <div className="page-hdr">
          <div className="page-hdr-left">
            <div className="page-title">Job Scheduler</div>
            <div className="page-sub">{allJobs.length} jobs configured · {kpiActive} active · scheduler ticks every 1 min</div>
          </div>
          <div className="page-actions">
            <button className="tb-btn-ghost" onClick={() => exportJobsCSV(displayed)}><Icon name="database" size={13}/>Export CSV</button>
            <button className="tb-btn-ghost" onClick={cleanupHiddenSchedules}><Icon name="trash" size={13}/>Clean Hidden Schedules</button>
            <button className="tb-btn-ghost" onClick={load}><Icon name="refresh" size={13}/>Refresh</button>
            <button className="tb-btn" onClick={() => setModalJob(emptyJob())}><Icon name="plus" size={13}/>Add Job</button>
          </div>
        </div>

        {/* KPIs */}
        <div className="grid-4" style={{ marginBottom:'14px' }}>
          {[
            ['Active',   kpiActive,   'var(--ok)',     'check'],
            ['Inactive', kpiInactive, 'var(--text4)',  'pause'],
            ['Failed',   kpiFailed,   'var(--err)',    'x'],
            ['Running',  kpiRunning,  'var(--blue)',   'refresh'],
          ].map(([label, val, color]) => (
            <div key={label} className="kpi" style={{ padding:'12px 14px' }}>
              <div className="kpi-label"><span className="kpi-label-dot" style={{ background:color }}/>{label}</div>
              <div className="kpi-val" style={{ color, fontSize:'22px' }}>{val}</div>
            </div>
          ))}
        </div>

        {/* Last Batch Run Status */}
        <div className="card" style={{ marginBottom:'14px', borderColor: batchStatus.state === 'err' ? 'var(--err-border)' : batchStatus.state === 'ok' ? 'var(--ok-border)' : 'var(--border)' }}>
          <div className="card-body" style={{ display:'grid', gridTemplateColumns:'1.2fr 1fr 1fr 2fr', gap:'10px', alignItems:'center' }}>
            <div>
              <div className="kpi-label">
                <span className="kpi-label-dot" style={{
                  background:
                    batchStatus.state === 'err' ? 'var(--err)' :
                    batchStatus.state === 'ok' ? 'var(--ok)' :
                    batchStatus.state === 'running' ? 'var(--blue)' : 'var(--text4)'
                }}/>
                Last Batch Run Status
              </div>
              <div style={{ fontSize:'12px', color:'var(--text)' }}>{batchStatus.lastJob || '—'}</div>
            </div>
            <div>
              <div className="kpi-label">Last Run</div>
              <div style={{ fontFamily:'var(--mono)', fontSize:'12px', color:'var(--text4)' }}>{batchStatus.lastRunAt || '—'}</div>
            </div>
            <div>
              <div className="kpi-label">Rows Pulled</div>
              <div style={{ fontFamily:'var(--mono)', fontSize:'14px', color:'var(--blue)' }}>{(batchStatus.rows || 0).toLocaleString()}</div>
            </div>
            <div>
              <div className="kpi-label">Message</div>
              <div style={{ fontSize:'12px', color: batchStatus.state === 'err' ? 'var(--err)' : 'var(--text4)' }}>{batchStatus.message}</div>
            </div>
          </div>
        </div>

        {/* Channel tabs */}
        <div style={{ display:'flex', gap:'3px', marginBottom:'14px', borderBottom:'1px solid var(--border)' }}>
          {['All','Zalora','Shopee','Lazada','Shopify','Magento','Custom'].map(ch => (
            (tabCounts[ch] > 0 || ch === 'All') ? (
              <button key={ch} onClick={() => setTabCh(ch)} style={{
                background:'transparent', border:'none', padding:'7px 14px',
                fontSize:'12px', fontWeight:500, cursor:'pointer',
                color: tabCh === ch ? 'var(--blue)' : 'var(--text4)',
                borderBottom: tabCh === ch ? '2px solid var(--cyan)' : '2px solid transparent',
                marginBottom:'-1px', transition:'all .12s',
              }}>
                {ch}
                <span style={{ marginLeft:'5px', fontSize:'10px', fontFamily:'var(--mono)', opacity:.7 }}>
                  {tabCounts[ch] ?? 0}
                </span>
              </button>
            ) : null
          ))}
        </div>

        {/* Filter bar */}
        <div className="filter-bar">
          <input className="filter-input" placeholder="Search job, shop, function, brand..."
            value={search} onChange={e => setSearch(e.target.value)} />
          {['All','active','inactive'].map(s => (
            <button key={s} className={`filter-btn${filterStatus===s?' active':''}`}
              onClick={() => setFilterStatus(s)}>{s}</button>
          ))}
          {selectedIds.length > 0 && <>
            <div style={{ width:'1px', height:'20px', background:'var(--border)' }}/>
            <span style={{ fontSize:'11px', color:'var(--text4)', fontFamily:'var(--mono)' }}>{selectedIds.length} selected</span>
            <button className="filter-btn active" onClick={bulkEnable}>Enable all</button>
            <button className="filter-btn" style={{ borderColor:'rgba(255,61,92,.3)', color:'var(--err)' }} onClick={bulkDisable}>Disable all</button>
          </>}
          <div className="filter-spacer"/>
          <span className="count-label">{loading ? 'Loading…' : `${displayed.length} jobs`}</span>
        </div>

        {/* Table */}
        <div className="card" style={{ padding:0 }}>
          <div className="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th style={{ width:'32px' }}>
                    <input type="checkbox" style={{ accentColor:'var(--blue)' }}
                      checked={selectedIds.length === displayed.length && displayed.length > 0}
                      onChange={toggleSelectAll}/>
                  </th>
                  <th>Job Name</th>
                  <th>Channel / Shop</th>
                  <th>Function</th>
                  <th>Frequency</th>
                  <th>Status</th>
                  <th>Last Run</th>
                  <th>Active</th>
                  <th style={{ width:'150px' }}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {loading && <tr><td colSpan={9} style={{ textAlign:'center', padding:'28px', color:'var(--text4)' }}>Loading jobs…</td></tr>}
                {!loading && displayed.length === 0 && (
                  <tr><td colSpan={9} style={{ textAlign:'center', padding:'28px', color:'var(--text4)' }}>
                    No jobs found.{' '}
                    <span style={{ color:'var(--blue)', cursor:'pointer' }} onClick={() => setModalJob(emptyJob())}>Add one →</span>
                  </td></tr>
                )}
                {!loading && displayed.map(job => {
                  const isActive    = statusOf(job);
                  const isFailed    = job.lastStatus === 'failed';
                  const isRunning   = !!running[job.id];
                  const isSelected  = selectedIds.includes(job.id);
                  const isExpanded  = expandedHistory[job.id];
                  const hist        = histForJob(job);
                  const ch          = channelOf(job);

                  return (
                    <React.Fragment key={job.id}>
                      <tr onClick={() => setSelected(selected?.id === job.id ? null : job)}
                        style={{ cursor:'pointer', background: selected?.id === job.id ? 'var(--bg4)' : '' }}>

                        <td onClick={e => e.stopPropagation()}>
                          <input type="checkbox" style={{ accentColor:'var(--blue)' }}
                            checked={isSelected}
                            onChange={() => setSelectedIds(ids =>
                              ids.includes(job.id) ? ids.filter(i => i !== job.id) : [...ids, job.id]
                            )}/>
                        </td>

                        <td>
                          <div style={{ display:'flex', alignItems:'center', gap:'7px' }}>
                            {isRunning && <span style={{ width:'7px', height:'7px', borderRadius:'50%', background:'var(--blue)', display:'inline-block', animation:'pulse 1s infinite' }}/>}
                            <span style={{ fontWeight:500, fontSize:'12px', color:'var(--text)', fontFamily:'var(--mono)' }}>{job.jobName}</span>
                          </div>
                        </td>

                        <td>
                          <div style={{ display:'flex', flexDirection:'column', gap:'2px' }}>
                            <ChBadge ch={ch}/>
                            <span style={{ fontSize:'10px', color:'var(--text4)', maxWidth:'140px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{job.shop}</span>
                          </div>
                        </td>

                        <td><span style={{ fontFamily:'var(--mono)', fontSize:'11px', color:'var(--text4)' }}>{job.freq}</span></td>

                        <td>

                                {isExpanded ? '▲' : 'Hist'}

                            <button onClick={() => deleteJob(job)}

                              Del

                          </div>
                        </td>
                      </tr>

                      {isExpanded && hist.map((h, i) => (
                        <tr key={i} style={{ background:'var(--bg)' }}>

                          <td colSpan={2} style={{ fontFamily:'var(--mono)', fontSize:'10px', color:'var(--text4)' }}>{h.pulled_at || h.ts}</td>
                          <td style={{ fontFamily:'var(--mono)', fontSize:'11px', color:'var(--blue)' }}>{(h.rows||0).toLocaleString()} rows</td>
                          <td><span className="badge badge-ok" style={{ fontSize:'10px' }}>success</span></td>
                          <td colSpan={3}>
                            {h.download_url
                              ? <a href={h.download_url} style={{ color:'var(--blue)', fontSize:'10px', fontFamily:'var(--mono)' }} onClick={e => e.stopPropagation()}>⬇ CSV</a>
                              : <span style={{ color:'var(--text4)', fontSize:'10px' }}>{h.filename || '—'}</span>}
                          </td>
                        </tr>
                      ))}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* Detail panel */}
      {selected && (
        <div className="detail-panel">
          <div className="dp-hdr">
            <Icon name="scheduler" size={14} color="var(--blue)"/>
            <span style={{ fontSize:'13px', fontWeight:600, color:'var(--text)' }}>Job Detail</span>
            <button className="dp-close" onClick={() => setSelected(null)}>×</button>
          </div>
          <div className="dp-section"><div className="dp-label">Job Name</div><div className="dp-mono">{selected.jobName}</div></div>
          <div className="dp-section"><div className="dp-label">Channel</div><div style={{ marginTop:'4px' }}><ChBadge ch={channelOf(selected)}/></div></div>
          <div className="dp-section"><div className="dp-label">Shop</div><div className="dp-val">{selected.shop}</div></div>
          <div className="dp-section"><div className="dp-label">Function</div><div className="dp-val" style={{ fontSize:'12px' }}>{selected.fn || '—'}</div></div>
          <div className="dp-section"><div className="dp-label">Frequency</div><div className="dp-mono">{selected.freq}</div></div>
          <div className="dp-section"><div className="dp-label">Start Date</div><div className="dp-mono">{selected.startDate || '—'}</div></div>
          {selected.endDate && <div className="dp-section"><div className="dp-label">End Date</div><div className="dp-mono">{selected.endDate}</div></div>}
          <div className="dp-section"><div className="dp-label">Last Run</div><div className="dp-mono">{selected.lastExec || 'Never'}</div></div>
          <div className="dp-section">
            <div className="dp-label">Status</div>
            <span className={`badge ${statusOf(selected) ? 'badge-ok' : 'badge-dim'}`} style={{ marginTop:'4px' }}>
              {statusOf(selected) ? 'Active' : 'Inactive'}

          </div>
          {selected.desc && <div className="dp-section"><div className="dp-label">Description</div><div className="dp-val" style={{ fontSize:'12px', color:'var(--text4)' }}>{selected.desc}</div></div>}
          {selected.notifyUsers?.length > 0 && (
            <div className="dp-section">
              <div className="dp-label">Notify Users</div>
              <div style={{ marginTop:'6px', display:'flex', flexDirection:'column', gap:'4px' }}>
                {selected.notifyUsers.map(u => (
                  <div key={u} style={{ fontSize:'11px', color:'var(--text4)', fontFamily:'var(--mono)', background:'var(--bg3)', borderRadius:'var(--r)', padding:'3px 7px' }}>{u}</div>
                ))}

          )}
          <div style={{ padding:'10px 16px' }}>
            <div className="dp-label" style={{ marginBottom:'6px' }}>Run History</div>
            {histForJob(selected).length === 0 && <div style={{ fontSize:'11px', color:'var(--text4)' }}>No history yet</div>}
            {histForJob(selected).map((h, i) => (
              <div key={i} style={{ padding:'7px 0', borderBottom:'1px solid var(--border)' }}>
                <div style={{ fontFamily:'var(--mono)', fontSize:'10px', color:'var(--text4)' }}>{h.pulled_at}</div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'3px' }}>

                  {h.download_url && <a href={h.download_url} style={{ color:'var(--blue)', fontSize:'10px' }}>⬇ CSV</a>}

            <button className="btn-primary" style={{ width:'100%', fontSize:'12px' }}
