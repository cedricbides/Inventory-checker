// ── Login Screen ───────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [username,setUsername]=React.useState('');
  const [password,setPassword]=React.useState('');
  const [error,setError]=React.useState('');
  const [loading,setLoading]=React.useState(false);

  const submit=async(e)=>{
    e.preventDefault();
    setError('');setLoading(true);
    try{
      const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const d=await r.json();
      if(r.ok){onLogin(d);}
      else{setError(d.error||'Login failed');}
    }catch{setError('Connection error');}
    setLoading(false);
  };

  return <div style={{flex:1,minHeight:'100vh',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:'40px 36px',width:340,boxShadow:'0 8px 32px rgba(0,0,0,0.18)'}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:4}}>OMS Middleware</div>
        <div style={{fontSize:12,color:'var(--text4)'}}>Sign in to your account</div>
      </div>
      <form onSubmit={submit}>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--text4)',marginBottom:5}}>USERNAME</div>
          <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="Enter username"
            style={{width:'100%',padding:'9px 12px',border:'1px solid var(--border)',borderRadius:6,background:'var(--bg)',color:'var(--text)',fontSize:13,boxSizing:'border-box'}} autoFocus/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--text4)',marginBottom:5}}>PASSWORD</div>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Enter password"
            style={{width:'100%',padding:'9px 12px',border:'1px solid var(--border)',borderRadius:6,background:'var(--bg)',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
        </div>
        {error&&<div style={{background:'#fee2e2',color:'#dc2626',borderRadius:6,padding:'8px 12px',fontSize:12,marginBottom:14}}>{error}</div>}
        <button type="submit" disabled={loading}
          style={{width:'100%',padding:'10px',background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,fontSize:13,fontWeight:600,cursor:'pointer',opacity:loading?0.7:1}}>
          {loading?'Signing in…':'Sign In'}
        </button>
      </form>
    </div>
  </div>;
}

  const [loading,setLoading]=React.useState(false);
  const [search,setSearch]=React.useState('');
  const [menuOpen,setMenuOpen]=React.useState(null);
  const [permView,setPermView]=React.useState(null); // user obj being configured

  const load=()=>fetch('/api/users').then(r=>r.json()).then(d=>setUsers(d.users||[])).catch(()=>{});
  React.useEffect(()=>{load();},[]);

  // Close menu on outside click
  React.useEffect(()=>{
    if(!menuOpen) return;
    const handler=()=>setMenuOpen(null);
    document.addEventListener('click',handler);
    return()=>document.removeEventListener('click',handler);
  },[menuOpen]);

  const save=async()=>{
    setLoading(true);
    try{
      const url=editId?`/api/users/${editId}`:'/api/users';
      const method=editId?'PUT':'POST';
      const body=editId?{role:form.role,full_name:form.full_name,permissions:form.permissions,...(form.password?{password:form.password}:{})}:form;
      const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      if(r.ok){showToast(editId?'User updated':'User created');setShowForm(false);setForm({username:'',password:'',full_name:'',role:'user',permissions:[]});setEditId(null);load();}
      else showToast(d.error||'Error','err');
    }catch{showToast('Error saving user','err');}
    setLoading(false);
  };

  const del=async(id,uname)=>{
    if(!confirm(`Delete user "${uname}"?`))return;
    const r=await fetch(`/api/users/${id}`,{method:'DELETE'});
    const d=await r.json();
    if(r.ok){showToast('User deleted');load();}
    else showToast(d.error||'Error','err');
  };

  const startEdit=(u)=>{
    const perms=typeof u.permissions==='string'?JSON.parse(u.permissions||'[]'):u.permissions||[];
    setForm({username:u.username,password:'',full_name:u.full_name||'',role:u.role,permissions:perms});
    setEditId(u.id);setShowForm(true);setMenuOpen(null);
  };

  const openPerms=(u)=>{
    const perms=typeof u.permissions==='string'?JSON.parse(u.permissions||'[]'):u.permissions||[];
    setPermView({...u,_perms:perms});setMenuOpen(null);
  };

  const savePerm=async()=>{
    if(!permView) return;
    setLoading(true);
    try{
      const r=await fetch(`/api/users/${permView.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({permissions:permView._perms})});
      const d=await r.json();
      if(r.ok){showToast('Permissions saved');load();setPermView(null);}
      else showToast(d.error||'Error','err');
    }catch{showToast('Error','err');}
    setLoading(false);
  };

  const togglePerm=(id)=>{
    setPermView(v=>{
      const hasAll=v._perms.includes('all');
      if(id==='all') return {...v,_perms:hasAll?[]:['all']};
      const cur=hasAll?MODULES.map(m=>m.id):v._perms.filter(p=>p!=='all');
      const next=cur.includes(id)?cur.filter(p=>p!==id):[...cur,id];
      const isAll=MODULES.every(m=>next.includes(m.id));
      return {...v,_perms:isAll?['all']:next};
    });
  };

  const permHas=(id)=>{
    if(!permView) return false;
    return permView._perms.includes('all')||permView._perms.includes(id);
  };
  const inp={width:'100%',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:6,background:'var(--bg)',color:'var(--text)',fontSize:12,boxSizing:'border-box'};

  const initials=(name,uname)=>(name||uname||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const avatarColors=['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899'];
  const avatarColor=(uname)=>avatarColors[(uname||'').charCodeAt(0)%avatarColors.length];

  const filtered=users.filter(u=>{
    const q=search.toLowerCase();
    return !q||(u.full_name||'').toLowerCase().includes(q)||u.username.toLowerCase().includes(q);
  });

  return <div style={{padding:24,height:'100%',boxSizing:'border-box',display:'flex',flexDirection:'column',gap:16}}>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
      <div style={{fontSize:13,fontWeight:600,color:'var(--text4)',flex:'0 0 auto'}}>User List</div>
      <div style={{flex:1,minWidth:160,position:'relative'}}>
        <svg style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text4)'}} width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, username…"
          style={{...inp,paddingLeft:28,maxWidth:320}}/>
      </div>
      <button onClick={()=>{setShowForm(true);setEditId(null);setForm({username:'',password:'',full_name:'',role:'user'});}}
        style={{width:36,height:36,borderRadius:'50%',background:'var(--blue)',color:'#fff',border:'none',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 8px rgba(59,130,246,0.4)'}}>+</button>
    </div>

    {/* Add/Edit Modal */}
    {showForm&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}
      onClick={e=>{if(e.target===e.currentTarget){setShowForm(false);setEditId(null);}}}>
      <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:12,padding:28,width:400,maxWidth:'92vw',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{fontSize:15,fontWeight:700,color:'var(--text)',marginBottom:20}}>{editId?'Edit User':'New User'}</div>
        <div style={{display:'grid',gap:14,marginBottom:20}}>
          {!editId&&<div><div style={{fontSize:11,color:'var(--text4)',marginBottom:5,fontWeight:600}}>USERNAME</div><input value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} placeholder="username" style={inp}/></div>}
          <div><div style={{fontSize:11,color:'var(--text4)',marginBottom:5,fontWeight:600}}>FULL NAME</div><input value={form.full_name} onChange={e=>setForm(f=>({...f,full_name:e.target.value}))} placeholder="Full name" style={inp}/></div>
          <div><div style={{fontSize:11,color:'var(--text4)',marginBottom:5,fontWeight:600}}>{editId?'NEW PASSWORD (leave blank to keep)':'PASSWORD'}</div><input type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder={editId?'Leave blank to keep':'Min 6 chars'} style={inp}/></div>
          <div><div style={{fontSize:11,color:'var(--text4)',marginBottom:5,fontWeight:600}}>ROLE</div>
            <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={{...inp,cursor:'pointer'}}>
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={save} disabled={loading} style={{flex:1,padding:'9px',background:'var(--blue)',color:'#fff',border:'none',borderRadius:7,fontSize:13,fontWeight:600,cursor:'pointer'}}>{loading?'Saving…':'Save'}</button>
          <button onClick={()=>{setShowForm(false);setEditId(null);}} style={{flex:1,padding:'9px',background:'var(--bg2)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:7,fontSize:13,cursor:'pointer'}}>Cancel</button>
        </div>
      </div>
    </div>}

    {/* Card Grid */}
    <div style={{flex:1,overflowY:'auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:12}}>
        {filtered.map(u=>{
          const isAdmin=u.role==='admin';
          const bg=avatarColor(u.username);
          return <div key={u.id} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:10,padding:'16px',position:'relative',transition:'box-shadow .15s'}}>
            {/* Three-dot menu */}
            <div style={{position:'absolute',top:12,right:12}}>
              <button onClick={e=>{e.stopPropagation();setMenuOpen(menuOpen===u.id?null:u.id);}}
                style={{background:'none',border:'none',cursor:'pointer',color:'var(--text4)',fontSize:18,padding:'2px 6px',borderRadius:4,lineHeight:1}}>⋮</button>
              {menuOpen===u.id&&<div style={{position:'absolute',right:0,top:26,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:7,boxShadow:'0 8px 24px rgba(0,0,0,.2)',zIndex:100,minWidth:150,overflow:'hidden'}}>
                <div onClick={()=>startEdit(u)} style={{padding:'9px 14px',fontSize:12,cursor:'pointer',color:'var(--text)'}}>Edit</div>
                <div onClick={()=>openPerms(u)} style={{padding:'9px 14px',fontSize:12,cursor:'pointer',color:'var(--text)',borderTop:'1px solid var(--border)'}}>Functionality Access</div>
                {u.username!==currentUser&&<div onClick={()=>{setMenuOpen(null);del(u.id,u.username);}} style={{padding:'9px 14px',fontSize:12,cursor:'pointer',color:'#ef4444'}}>Delete</div>}
              </div>}
            </div>
            {/* Avatar + Name */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <div style={{width:42,height:42,borderRadius:'50%',background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff',flexShrink:0}}>
                {initials(u.full_name,u.username)}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.3}}>{u.full_name||u.username}</div>
                <div style={{fontSize:11,color:'var(--text4)',marginTop:2,display:'flex',alignItems:'center',gap:5}}>
                  {isAdmin&&<span style={{fontSize:11}}>⭐</span>}
                  <span style={{textTransform:'capitalize'}}>{isAdmin?'Administrator':'User'}</span>
                </div>
              </div>
            </div>
            {/* Details */}
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12,color:'var(--text4)'}}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.username}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12,color:'var(--text4)'}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
                  <span>{u.last_login?new Date(u.last_login).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}):'Never logged in'}</span>
                </div>
                <div style={{width:8,height:8,borderRadius:'50%',background:'#22c55e',flexShrink:0}}/>
              </div>
            </div>
          </div>;
        })}
        {filtered.length===0&&<div style={{gridColumn:'1/-1',padding:40,textAlign:'center',color:'var(--text4)',fontSize:13}}>No users found.</div>}
      </div>
    </div>

    {/* ── Functionality Access Overlay ── */}
    {permView&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:300,display:'flex',alignItems:'stretch',justifyContent:'flex-end'}}>
      <div style={{width:'min(640px,100vw)',background:'var(--bg)',display:'flex',flexDirection:'column',boxShadow:'-8px 0 32px rgba(0,0,0,.3)'}}>
        {/* Header */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>Functionality Access</div>
            <div style={{fontSize:12,color:'var(--text4)',marginTop:2}}>{permView.full_name||permView.username}</div>
          </div>
          <button onClick={()=>setPermView(null)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text4)',fontSize:20,lineHeight:1,padding:'2px 6px'}}>✕</button>
        </div>

        {/* All Access toggle */}
        <div style={{padding:'12px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
          <input type="checkbox" id="perm-all"
            checked={permView._perms.includes('all')}
            onChange={()=>togglePerm('all')}
            style={{width:15,height:15,accentColor:'var(--blue)',cursor:'pointer'}}/>
          <label htmlFor="perm-all" style={{fontSize:13,fontWeight:700,color:'var(--text)',cursor:'pointer',userSelect:'none'}}>
            ★ ALL ACCESS
          </label>
        </div>

        {/* Two-column module list */}
        <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',borderBottom:'1px solid var(--border)',padding:'6px 20px 10px'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--text4)',letterSpacing:1}}>MODULE</div>
            <div style={{fontSize:10,fontWeight:700,color:'var(--text4)',letterSpacing:1}}>ACCESS</div>
          </div>
          {MODULES.map(m=>{
            const checked=permHas(m.id);
            return <div key={m.id} style={{display:'grid',gridTemplateColumns:'1fr auto',alignItems:'center',padding:'11px 20px',borderBottom:'1px solid var(--border)',background:checked?'rgba(59,130,246,0.04)':'transparent'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <input type="checkbox" id={`perm-${m.id}`}
                  checked={checked}
                  onChange={()=>togglePerm(m.id)}
                  style={{width:15,height:15,accentColor:'var(--blue)',cursor:'pointer'}}/>
                <label htmlFor={`perm-${m.id}`} style={{fontSize:13,color:'var(--text)',cursor:'pointer',userSelect:'none'}}>{m.label}</label>
              </div>
              <div style={{fontSize:11,color:checked?'var(--blue)':'var(--text4)',fontWeight:checked?600:400}}>
                {checked?'Enabled':'—'}
              </div>
            </div>;
          })}
        </div>

        {/* Footer */}
        <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button onClick={()=>setPermView(null)}
            style={{padding:'8px 20px',background:'var(--bg2)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:7,fontSize:12,cursor:'pointer',fontWeight:600}}>
            CANCEL
          </button>
          <button onClick={savePerm} disabled={loading}
            style={{padding:'8px 20px',background:'var(--blue)',color:'#fff',border:'none',borderRadius:7,fontSize:12,cursor:'pointer',fontWeight:600}}>
            {loading?'Saving…':'SAVE CONFIGURATION'}
          </button>
        </div>
      </div>
    </div>}
  </div>;
}

function App(){
  const [page,setPage]=useState('dashboard');
  const [currentUser,setCurrentUser]=React.useState(null);  // null = not logged in
  const [authChecked,setAuthChecked]=React.useState(false);
  // All hooks must be declared at the top — before any early returns
  const [jobs,setJobs]=useState([]);
  const [discs,setDiscs]=useState([]);
  const [retryQueue,setRetryQueue]=useState([]);
  const [toast,setToast]=useState(null);
  const [now,setNow]=useState(new Date());
  const [showNotif,setShowNotif]=useState(false);
  const [notifications,setNotifications]=useState([]);

  // Check session on mount
  React.useEffect(()=>{
    fetch('/api/auth/me').then(r=>r.json())
      .then(d=>{ if(d.logged_in) setCurrentUser(d); })
      .catch(()=>{})
      .finally(()=>setAuthChecked(true));
  },[]);

  const handleLogin=(user)=>setCurrentUser(user);
  const handleLogout=async()=>{
    await fetch('/api/auth/logout',{method:'POST'});
    setCurrentUser(null);
  };

  // Intercept 401s globally — redirect to login
  React.useEffect(()=>{
    if(!currentUser) return;
    const orig=window.fetch;
    window.fetch=async(...args)=>{
      const r=await orig(...args);
      if(r.status===401){ const d=await r.clone().json().catch(()=>({})); if(d.login_required) setCurrentUser(null); }
      return r;
    };
    return()=>{ window.fetch=orig; };
  },[currentUser]);

  // Generate real notifications from live DB data (only when logged in)
  // Single combined load on login — avoids duplicate /api/discrepancies calls
  useEffect(()=>{
    if(!currentUser) return;
    Promise.all([
      fetch('/api/jobs').then(r=>r.json()).catch(()=>[]),
      fetch('/api/discrepancies').then(r=>r.json()).catch(()=>[]),
      fetch('/api/metrics').then(r=>r.json()).catch(()=>({})),
      fetch('/api/retry').then(r=>r.json()).catch(()=>[]),
    ]).then(([jobsData,discData,metricsData,retryData])=>{
      setJobs((jobsData||[]).map(j=>({...j,active:Boolean(j.active),notifyOnFail:Boolean(j.notify_on_fail),notifyUsers:j.notify_users||[],jobName:j.job_name,lastExec:j.last_exec,lastStatus:j.last_status,startDate:j.start_date})));
      const mappedDiscs=(discData||[]).map(d=>({...d,ordazzleQty:d.ordazzle_qty,channelQty:d.channel_qty,sapQty:d.sap_qty,lastChecked:d.last_checked}));
      setDiscs(mappedDiscs);
      setRetryQueue((retryData||[]).map(r=>({...r,jobName:r.job_name,maxAttempts:r.max_attempts,nextRetry:r.next_retry,lastAttempt:r.last_attempt})));
      const notifs=[];
      const failedJ=(jobsData||[]).filter(j=>j.last_status==='failed');
      failedJ.slice(0,3).forEach((j,i)=>{
        notifs.push({id:'nj-'+i,type:'error',title:'Job failed',msg:`${j.job_name||j.jobName} — check retry queue`,ts:j.last_exec||'',read:false});
      });
      const highDisc=mappedDiscs.filter(d=>d.severity==='high'&&['open','escalated'].includes(d.status));
      highDisc.slice(0,3).forEach((d,i)=>{
        notifs.push({id:'nd-'+i,type:'warn',title:'High severity discrepancy',msg:`${d.sku} on ${d.channel} — diff: ${d.diff>0?'+':''}${d.diff}`,ts:d.last_checked||'',read:false});
      });
      const pulls=(metricsData?.recent_activity||[]).filter(a=>a.source==='pull');
      pulls.slice(0,2).forEach((p,i)=>{
        notifs.push({id:'np-'+i,type:'info',title:'Zalora pull complete',msg:p.detail,ts:p.ts,read:true});
      });
      setNotifications(notifs);
    });
  },[currentUser]);

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t);},[]);

  // Early returns — safe now because all hooks are declared above
  if(!authChecked) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',color:'var(--text4)',fontSize:13}}>Loading…</div>;
  if(!currentUser) return <LoginScreen onLogin={handleLogin}/>;
  const showToast=(msg,type='ok')=>setToast({msg,type});
  const markRead=(id)=>setNotifications(ns=>ns.map(n=>n.id===id?{...n,read:true}:n));
  const unreadCount=notifications.filter(n=>!n.read).length;

  const failedJobs=jobs.filter(j=>j.lastStatus==='failed').length;
  const openDiscs=discs.filter(d=>['open','escalated'].includes(d.status)).length;
  const titles={dashboard:'OMS Middleware',scheduler:'Job Scheduler',discrepancy:'Discrepancy Engine',retry:'Retry Queue',monitor:'Sync Monitor',inventory:'Inventory Check',zalora_inventory:'Zalora Inventory',unified_inventory:'Unified Inventory Record',audit:'Audit Log',settings:'API Settings'};
  const sections=[...new Set(NAV.map(n=>n.section))];

  return<div style={{display:'flex',height:'100vh',overflow:'hidden',flexDirection:'column'}}>
    <div style={{display:'flex',flex:1,overflow:'hidden'}}>
      <div id="sidebar">
        <div className="sb-logo">
          <div className="sb-logo-mark"><svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 2L16 6V12L9 16L2 12V6L9 2Z"/><circle cx="9" cy="9" r="2"/></svg></div>
          <div><div className="sb-logo-text">Inventory Checker</div><div className="sb-logo-sub"></div></div>
        </div>
        <div className="sb-nav">
          {sections.map(sec=><div key={sec}>
            <div className="sb-section">{sec}</div>
            {NAV.filter(n=>n.section===sec).filter(n=>n.id!=='users'||currentUser?.role==='admin').map(n=><div key={n.id} className={`sb-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
              <Icon name={n.icon} size={14}/>
              <span>{n.label}</span>
              {n.id==='retry'&&retryQueue.length>0&&<span className="sb-badge">{retryQueue.length}</span>}
              {n.id==='discrepancy'&&openDiscs>0&&<span className="sb-badge warn">{openDiscs}</span>}
              {n.id==='scheduler'&&failedJobs>0&&<span className="sb-badge">{failedJobs}</span>}
            </div>)}
          </div>)}
        </div>
        <div className="sb-footer">
          <div className="sb-avatar">{(currentUser?.full_name||currentUser?.username||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="sb-user-name">{currentUser?.full_name||currentUser?.username}</div>
            <div className="sb-user-role" style={{textTransform:'capitalize'}}>{currentUser?.role}</div>
          </div>
          <button onClick={handleLogout} title="Sign out" style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',color:'var(--text4)',fontSize:11,fontWeight:600,padding:'5px 10px',display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </div>
      <div id="main">
        <div id="topbar">
          <div className="tb-title">{titles[page]}</div>

          <div className="tb-spacer"/>
        </div>
        <div id="content">
          {page==='dashboard'&&<Dashboard jobs={jobs} discrepancies={discs} retryQueue={retryQueue}/>}
          {page==='scheduler'&&<JobScheduler showToast={showToast}/>}
          {page==='discrepancy'&&<DiscrepancyEngine discrepancies={discs} onUpdate={setDiscs} showToast={showToast}/>}
          {page==='retry'&&<RetryQueue queue={retryQueue} setQueue={setRetryQueue} showToast={showToast}/>}
          {page==='monitor'&&<SyncMonitor jobs={jobs}/>}
          {page==='inventory'&&<InventoryCheck showToast={showToast}/>}
          {page==='zalora_inventory'&&<ZaloraInventory showToast={showToast}/>}
          {page==='unified_inventory'&&<UnifiedInventory showToast={showToast}/>}
          {page==='audit'&&<AuditLog/>}
          {page==='settings'&&<Settings showToast={showToast}/>}
          {page==='users'&&<UserManagement showToast={showToast} currentUser={currentUser?.username}/>}
        </div>
      </div>
    </div>
    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
